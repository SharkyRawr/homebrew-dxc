name: Build and upload bottles

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-bottles:
    name: Build bottle on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-26]
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Create tap and build bottle
        run: |
          # setup-homebrew symlinks $GITHUB_WORKSPACE to the tap directory for
          # homebrew-* repos. Only create the symlink if it doesn't exist yet.
          BREW_TAPS_DIR="$(brew --repo)/Library/Taps/sharkyrawr"
          mkdir -p "$BREW_TAPS_DIR"
          if [ ! -e "$BREW_TAPS_DIR/homebrew-dxc" ]; then
            ln -sf "$GITHUB_WORKSPACE" "$BREW_TAPS_DIR/homebrew-dxc"
          fi

          # Build the bottle from the tap
          brew install --build-bottle sharkyrawr/dxc/directx-shader-compiler
          brew bottle --json sharkyrawr/dxc/directx-shader-compiler

      - name: Upload bottle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bottle-${{ matrix.os }}
          path: |
            *.tar.gz
            *.json

  upload-bottles:
    name: Upload bottles to release
    needs: build-bottles
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all bottles
        uses: actions/download-artifact@v4
        with:
          path: bottles
          pattern: bottle-*

      - name: Upload bottles to release
        uses: softprops/action-gh-release@v2
        with:
          files: bottles/**/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-formula:
    name: Update formula with bottle SHAs
    needs: [build-bottles, upload-bottles]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Download all bottles
        uses: actions/download-artifact@v4
        with:
          path: bottles
          pattern: bottle-*

      - name: Update formula with bottle blocks
        env:
          BOTTLE_ROOT_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
        run: |
          python3 - <<'EOF'
          import json, re, glob, os

          root_url = os.environ["BOTTLE_ROOT_URL"]
          bottle_entries = []
          rebuild = 0

          for json_file in sorted(glob.glob("bottles/**/*.json", recursive=True)):
              with open(json_file) as f:
                  data = json.load(f)
              formula_key = next(iter(data))
              bottle = data[formula_key]["formula"]["bottle"]
              rebuild = bottle.get("rebuild", 0)
              for platform, info in bottle["tags"].items():
                  sha256 = info["sha256"]
                  cellar = info.get("cellar", ":any")
                  bottle_entries.append(f'    sha256 cellar: {cellar}, {platform}: "{sha256}"')

          rebuild_line = f"    rebuild {rebuild}\n" if rebuild > 0 else ""
          sha256_lines = "\n".join(bottle_entries)
          bottle_block = (
              f'  bottle do\n'
              f'    root_url "{root_url}"\n'
              f'{rebuild_line}'
              f'{sha256_lines}\n'
              f'  end'
          )

          with open("Formula/directx-shader-compiler.rb") as f:
              content = f.read()

          # Remove any existing bottle block
          content = re.sub(r'\n\n  bottle do\n.*?\n  end', '', content, flags=re.DOTALL)

          # Insert after license line
          content = re.sub(r'(  license "[^"]*")', rf'\1\n\n{bottle_block}', content)

          with open("Formula/directx-shader-compiler.rb", "w") as f:
              f.write(content)

          print(open("Formula/directx-shader-compiler.rb").read())
          EOF

      - name: Commit and push updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/directx-shader-compiler.rb
          git commit -m "Update bottles for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin main
