name: Build and upload bottles

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-bottles:
    name: Build bottle on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-14, macos-15]
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Create tap and build bottle
        run: |
          # Create the tap directory structure
          mkdir -p $(brew --repo)/Library/Taps/sharkyrawr/homebrew-dxc
          cp -r . $(brew --repo)/Library/Taps/sharkyrawr/homebrew-dxc/
          
          # Build the bottle from the tap
          brew install --build-bottle sharkyrawr/dxc/directx-shader-compiler
          brew bottle --json sharkyrawr/dxc/directx-shader-compiler
          
          # Copy bottles back to workspace
          cp *.tar.gz $GITHUB_WORKSPACE/ || true
          cp *.json $GITHUB_WORKSPACE/ || true

      - name: Upload bottle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bottle-${{ matrix.os }}
          path: |
            *.tar.gz
            *.json

  upload-bottles:
    name: Upload bottles to release
    needs: build-bottles
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all bottles
        uses: actions/download-artifact@v4
        with:
          path: bottles
          pattern: bottle-*

      - name: Upload bottles to release
        uses: softprops/action-gh-release@v2
        with:
          files: bottles/**/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-formula:
    name: Update formula with bottle SHAs
    needs: [build-bottles, upload-bottles]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all bottles
        uses: actions/download-artifact@v4
        with:
          path: bottles
          pattern: bottle-*

      - name: Update formula with bottle blocks
        run: |
          # Find all bottle JSON files and process them
          BOTTLE_ROOT_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"
          
          # Start building the bottle block
          BOTTLE_BLOCK="  bottle do\n"
          BOTTLE_BLOCK+="    root_url \"${BOTTLE_ROOT_URL}\"\n"
          BOTTLE_BLOCK+="    rebuild 1\n"
          
          # Process each bottle JSON
          for json_file in bottles/**/*.json; do
            if [ -f "$json_file" ]; then
              sha256=$(jq -r '.[keys[0]].formula.sha256' "$json_file" 2>/dev/null || echo "")
              platform=$(jq -r '.[keys[0]].formula.bottle' "$json_file" 2>/dev/null || echo "")
              
              if [ -n "$sha256" ] && [ -n "$platform" ]; then
                BOTTLE_BLOCK+="    sha256 cellar: :any, ${platform}: \"${sha256}\"\n"
              fi
            fi
          done
          
          BOTTLE_BLOCK+="  end"
          
          # Insert bottle block after license line
          sed -i "/^  license \"LLVM\"/a\\n${BOTTLE_BLOCK}" Formula/directx-shader-compiler.rb
          
          cat Formula/directx-shader-compiler.rb

      - name: Commit and push updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/directx-shader-compiler.rb
          git commit -m "Update bottles for ${{ github.ref_name }}" || echo "No changes to commit"
          git push
