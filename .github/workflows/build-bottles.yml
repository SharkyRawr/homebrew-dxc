name: Build and upload bottles

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-bottles:
    name: Build bottle on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-26]
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Create tap and build bottle
        run: |
          # setup-homebrew symlinks $GITHUB_WORKSPACE to the tap directory for
          # homebrew-* repos. Only create the symlink if it doesn't exist yet.
          BREW_TAPS_DIR="$(brew --repo)/Library/Taps/sharkyrawr"
          mkdir -p "$BREW_TAPS_DIR"
          if [ ! -e "$BREW_TAPS_DIR/homebrew-dxc" ]; then
            ln -sf "$GITHUB_WORKSPACE" "$BREW_TAPS_DIR/homebrew-dxc"
          fi

          # Build the bottle from the tap
          brew install --build-bottle sharkyrawr/dxc/directx-shader-compiler
          brew bottle --json sharkyrawr/dxc/directx-shader-compiler

      - name: Upload bottle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bottle-${{ matrix.os }}
          path: |
            *.tar.gz
            *.json

  upload-bottles:
    name: Upload bottles to release
    needs: build-bottles
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all bottles
        uses: actions/download-artifact@v4
        with:
          path: bottles
          pattern: bottle-*

      - name: Upload bottles to release
        uses: softprops/action-gh-release@v2
        with:
          files: bottles/**/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-formula:
    name: Update formula with bottle SHAs
    needs: [build-bottles, upload-bottles]
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Download all bottles
        uses: actions/download-artifact@v4
        with:
          path: bottles
          pattern: bottle-*

      - name: Register tap
        run: |
          BREW_TAPS_DIR="$(brew --repo)/Library/Taps/sharkyrawr"
          mkdir -p "$BREW_TAPS_DIR"
          if [ ! -e "$BREW_TAPS_DIR/homebrew-dxc" ]; then
            ln -sf "$GITHUB_WORKSPACE" "$BREW_TAPS_DIR/homebrew-dxc"
          fi

      - name: Merge bottle JSON into formula
        run: |
          ROOT_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"
          json_files=()
          while IFS= read -r f; do json_files+=("$f"); done < <(find bottles -name "*.json" | sort)
          brew bottle --merge --write --no-commit --root-url "$ROOT_URL" "${json_files[@]}"

      - name: Commit and push updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add Formula/directx-shader-compiler.rb
          git commit -m "Update bottles for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin main
